const levelNameEl = document.getElementById("levelName");

function shuffle(array) {
  return array.sort(() => Math.random() - 0.5);
}

function startGame(level) {
  if (level === "easy") {
    currentQuiz = shuffle(quizData.filter(x => x.level === "easy"));
    levelLabel = "??";
  } else if (level === "normal") {
    currentQuiz = shuffle(quizData.filter(x => x.level === "normal"));
    levelLabel = "??";
  } else if (level === "hard") {
    currentQuiz = shuffle(quizData.filter(x => x.level === "hard"));
    levelLabel = "??";
  } else {
    currentQuiz = shuffle([...quizData]);
    levelLabel = "?100?";
  }

  current = 0;
  score = 0;
  scoreEl.textContent = score;
  totalEl.textContent = currentQuiz.length;
  levelNameEl.textContent = levelLabel;

  menu.classList.add("hidden");
  quiz.classList.remove("hidden");
  restartBtn.style.display = "none";

  loadQuestion();
}

function loadQuestion() {
  answered = false;
  resultEl.textContent = "";
  commentEl.textContent = "";
  nextBtn.style.display = "none";
  choicesEl.innerHTML = "";

  const q = currentQuiz[current];

  countEl.textContent = current + 1;
  questionEl.textContent = q.q;

  shuffle([...q.c]).forEach(choice => {
    const btn = document.createElement("button");
    btn.textContent = choice;
    btn.className = "choice";
    btn.onclick = () => checkAnswer(btn, choice);
    choicesEl.appendChild(btn);
  });
}

function checkAnswer(button, selected) {
  if (answered) return;
  answered = true;

  const q = currentQuiz[current];
  const buttons = document.querySelectorAll(".choice");

  buttons.forEach(btn => {
    if (btn.textContent === q.a) {
      btn.classList.add("correct");
    }
    btn.disabled = true;
  });

  if (selected === q.a) {
    score += 10;
    scoreEl.textContent = score;
    resultEl.textContent = "???";
  } else {
    button.classList.add("wrong");
    resultEl.textContent = "????";
  }

  commentEl.textContent = q.e;

  if (current < currentQuiz.length - 1) {
    nextBtn.style.display = "inline-block";
  } else {
    finishGame();
  }
}

function nextQuestion() {
  current++;
  loadQuestion();
}

function finishGame() {
  questionEl.textContent = "??????";
  choicesEl.innerHTML = "";
  nextBtn.style.display = "none";
  restartBtn.style.display = "inline-block";

  const max = currentQuiz.length * 10;
  const rate = Math.round((score / max) * 100);

  commentEl.textContent = `???????? ${score} / ${max} ????? ${rate}% ???`;

  if (rate === 100) {
    resultEl.textContent = "? ????????????";
  } else if (rate >= 80) {
    resultEl.textContent = "? ????????";
  } else if (rate >= 50) {
    resultEl.textContent = "? ???????";
  } else {
    resultEl.textContent = "? ?????????????";
  }
}

function restartGame() {
  quiz.classList.add("hidden");
  menu.classList.remove("hidden");
