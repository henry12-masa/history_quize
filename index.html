<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>歴史クイズ100問</title>
  <style>
    body {
      margin: 0;
      font-family: "Yu Gothic", "Hiragino Sans", sans-serif;
      background: linear-gradient(135deg, #f8ead0, #c99b55);
      color: #2b1d0e;
      min-height: 100vh;
    }

    .ad-top {
      position: fixed;
      top: 12px;
      right: 12px;
      width: 300px;
      height: 90px;
      background: rgba(255,255,255,0.85);
      border: 2px dashed #8b5a2b;
      border-radius: 12px;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 14px;
      color: #6b4a25;
      z-index: 10;
    }

    .wrap {
      max-width: 760px;
      margin: 0 auto;
      padding: 120px 16px 40px;
    }

    .game {
      background: rgba(255, 250, 235, 0.97);
      border: 4px solid #8b5a2b;
      border-radius: 24px;
      padding: 26px;
      box-shadow: 0 12px 30px rgba(0,0,0,0.25);
      text-align: center;
    }

    h1 {
      margin-top: 0;
      font-size: 32px;
    }

    .menu button,
    .choice,
    .next,
    .restart {
      font-size: 18px;
      padding: 14px;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      background: #8b5a2b;
      color: #fff;
      font-weight: bold;
      transition: 0.2s;
    }

    button:hover {
      transform: scale(1.03);
      opacity: 0.95;
    }

    .menu {
      display: grid;
      gap: 14px;
      margin-top: 20px;
    }

    .status {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 18px;
      font-weight: bold;
      flex-wrap: wrap;
    }

    .question {
      font-size: 22px;
      font-weight: bold;
      background: #fff3d4;
      border-radius: 16px;
      padding: 22px;
      margin-bottom: 20px;
      line-height: 1.6;
    }

    .choices {
      display: grid;
      gap: 12px;
    }

    .choice.correct {
      background: #2e8b57;
    }

    .choice.wrong {
      background: #b22222;
    }

    .result {
      font-size: 22px;
      font-weight: bold;
      margin-top: 18px;
      min-height: 32px;
    }

    .comment {
      margin-top: 12px;
      font-size: 15px;
      color: #5b4630;
      line-height: 1.6;
    }

    .next {
      margin-top: 18px;
      background: #1f4e79;
      display: none;
    }

    .restart {
      margin-top: 18px;
      background: #6b3fa0;
      display: none;
    }

    .ad-bottom {
      margin-top: 24px;
      height: 100px;
      background: rgba(255,255,255,0.85);
      border: 2px dashed #8b5a2b;
      border-radius: 14px;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #6b4a25;
      font-size: 14px;
    }

    .hidden {
      display: none;
    }

    @media (max-width: 900px) {
      .ad-top {
        position: static;
        width: auto;
        height: 70px;
        margin: 12px;
      }

      .wrap {
        padding-top: 20px;
      }
    }
  </style>
</head>
<body>

  <div class="wrap">
    <div class="game">
      <h1>🏯 歴史クイズ100問</h1>

      <div id="menu">
        <p>難易度を選んでください</p>
        <div class="menu">
          <button onclick="startGame('easy')">初級：日本史の基本</button>
          <button onclick="startGame('normal')">中級：年代・人物</button>
          <button onclick="startGame('hard')">上級：細かい知識</button>
          <button onclick="startGame('all')">全100問ランダム</button>
        </div>
      </div>

      <div id="quiz" class="hidden">
        <div class="status">
          <div>難易度：<span id="levelName"></span></div>
          <div>問題：<span id="count">1</span>/<span id="total"></span></div>
          <div>スコア：<span id="score">0</span></div>
        </div>

        <div class="question" id="question"></div>
        <div class="choices" id="choices"></div>

        <div class="result" id="result"></div>
        <div class="comment" id="comment"></div>

        <button class="next" id="nextBtn" onclick="nextQuestion()">次の問題へ</button>
        <button class="restart" id="restartBtn" onclick="restartGame()">メニューに戻る</button>
      </div>

      <div class="ad-bottom">

<script>
const quizData = [
  { level:"easy", q:"鎌倉幕府を開いた人物は？", c:["源頼朝","平清盛","足利尊氏","徳川家康"], a:"源頼朝", e:"源頼朝は鎌倉幕府を開いた武士です。" },
  { level:"easy", q:"江戸幕府を開いた人物は？", c:["徳川家康","豊臣秀吉","織田信長","徳川吉宗"], a:"徳川家康", e:"1603年に徳川家康が江戸幕府を開きました。" },
  { level:"easy", q:"本能寺の変で討たれた人物は？", c:["織田信長","武田信玄","上杉謙信","伊達政宗"], a:"織田信長", e:"1582年、本能寺の変で織田信長が討たれました。" },
  { level:"easy", q:"関ヶ原の戦いが起きた年は？", c:["1600年","1192年","1333年","1868年"], a:"1600年", e:"関ヶ原の戦いは1600年です。" },
  { level:"easy", q:"明治維新で終わった幕府は？", c:["江戸幕府","鎌倉幕府","室町幕府","奈良幕府"], a:"江戸幕府", e:"明治維新により江戸幕府の時代が終わりました。" },
  { level:"easy", q:"黒船を率いて来航した人物は？", c:["ペリー","ザビエル","ナポレオン","コロンブス"], a:"ペリー", e:"1853年、ペリーが浦賀に来航しました。" },
  { level:"easy", q:"キリスト教を日本に伝えた人物は？", c:["フランシスコ・ザビエル","ペリー","ルター","マッカーサー"], a:"フランシスコ・ザビエル", e:"1549年にザビエルが来日しました。" },
  { level:"easy", q:"豊臣秀吉が行った武器を取り上げる政策は？", c:["刀狩","参勤交代","廃藩置県","楽市楽座"], a:"刀狩", e:"刀狩は農民から武器を取り上げる政策です。" },
  { level:"easy", q:"江戸時代、大名を江戸に通わせた制度は？", c:["参勤交代","班田収授","太閤検地","地租改正"], a:"参勤交代", e:"参勤交代は大名統制の制度です。" },
  { level:"easy", q:"大化の改新の中心人物は？", c:["中大兄皇子","坂本龍馬","源義経","西郷隆盛"], a:"中大兄皇子", e:"中大兄皇子と中臣鎌足が中心です。" },

  { level:"easy", q:"奈良時代の都は？", c:["平城京","平安京","鎌倉","江戸"], a:"平城京", e:"奈良時代の都は平城京です。" },
  { level:"easy", q:"平安時代の都は？", c:["平安京","平城京","藤原京","大宰府"], a:"平安京", e:"794年に平安京へ遷都されました。" },
  { level:"easy", q:"聖徳太子が定めたとされるものは？", c:["十七条の憲法","武家諸法度","御成敗式目","五箇条の御誓文"], a:"十七条の憲法", e:"聖徳太子は十七条の憲法で知られます。" },
  { level:"easy", q:"源平合戦で滅びた一族は？", c:["平氏","源氏","藤原氏","北条氏"], a:"平氏", e:"壇ノ浦の戦いで平氏が滅びました。" },
  { level:"easy", q:"室町幕府を開いた人物は？", c:["足利尊氏","源頼朝","徳川家康","北条時政"], a:"足利尊氏", e:"足利尊氏が室町幕府を開きました。" },
  { level:"easy", q:"江戸時代の身分制度で武士の次に位置したのは？", c:["農民","商人","職人","僧侶"], a:"農民", e:"一般に士農工商と説明されます。" },
  { level:"easy", q:"明治政府が進めた近代産業育成政策は？", c:["殖産興業","参勤交代","刀狩","鎖国"], a:"殖産興業", e:"殖産興業は近代産業を育てる政策です。" },
  { level:"easy", q:"江戸時代に外国との交流を制限した政策は？", c:["鎖国","開国","廃藩置県","大政奉還"], a:"鎖国", e:"江戸幕府は対外交流を制限しました。" },
  { level:"easy", q:"幕末に大政奉還を行った将軍は？", c:["徳川慶喜","徳川家康","徳川吉宗","徳川家光"], a:"徳川慶喜", e:"徳川慶喜が大政奉還を行いました。" },
  { level:"easy", q:"明治時代に藩を廃止して県を置いた改革は？", c:["廃藩置県","地租改正","版籍奉還","学制"], a:"廃藩置県", e:"1871年に廃藩置県が行われました。" },

  { level:"easy", q:"日本最古級の歌集は？", c:["万葉集","源氏物語","平家物語","古今和歌集"], a:"万葉集", e:"万葉集は日本最古級の歌集です。" },
  { level:"easy", q:"『源氏物語』の作者は？", c:["紫式部","清少納言","卑弥呼","小野小町"], a:"紫式部", e:"源氏物語の作者は紫式部です。" },
  { level:"easy", q:"『枕草子』の作者は？", c:["清少納言","紫式部","和泉式部","北条政子"], a:"清少納言", e:"枕草子の作者は清少納言です。" },
  { level:"easy", q:"邪馬台国の女王は？", c:["卑弥呼","推古天皇","持統天皇","北条政子"], a:"卑弥呼", e:"邪馬台国の女王として卑弥呼が知られます。" },
  { level:"easy", q:"日本で最初の本格的な武家政権は？", c:["鎌倉幕府","江戸幕府","室町幕府","明治政府"], a:"鎌倉幕府", e:"鎌倉幕府は最初の本格的な武家政権です。" },
  { level:"easy", q:"徳川家康が勝利した大きな戦いは？", c:["関ヶ原の戦い","壇ノ浦の戦い","承久の乱","応仁の乱"], a:"関ヶ原の戦い", e:"関ヶ原の戦いで家康は天下を決定づけました。" },
  { level:"easy", q:"江戸時代の将軍がいた場所は？", c:["江戸城","大阪城","姫路城","熊本城"], a:"江戸城", e:"江戸幕府の中心は江戸城です。" },
  { level:"easy", q:"明治時代に首都となった都市は？", c:["東京","京都","大阪","奈良"], a:"東京", e:"江戸は東京と改められました。" },
  { level:"easy", q:"豊臣秀吉が全国の田畑を調べた政策は？", c:["太閤検地","刀狩","参勤交代","地租改正"], a:"太閤検地", e:"太閤検地で土地や収穫量を調べました。" },
  { level:"easy", q:"戦国時代を終わらせた天下人は？", c:["徳川家康","源頼朝","足利義満","聖徳太子"], a:"徳川家康", e:"関ヶ原以後、徳川家康が全国支配を固めました。" },

  { level:"normal", q:"応仁の乱が始まった年は？", c:["1467年","1333年","1600年","1185年"], a:"1467年", e:"応仁の乱は1467年に始まり、戦国時代のきっかけとなりました。" },
  { level:"normal", q:"承久の乱で敗れた上皇は？", c:["後鳥羽上皇","白河上皇","後醍醐天皇","鳥羽上皇"], a:"後鳥羽上皇", e:"承久の乱では後鳥羽上皇が幕府に敗れました。" },
  { level:"normal", q:"御成敗式目を制定した人物は？", c:["北条泰時","源頼朝","足利尊氏","徳川家康"], a:"北条泰時", e:"1232年、北条泰時が御成敗式目を制定しました。" },
  { level:"normal", q:"建武の新政を行った天皇は？", c:["後醍醐天皇","聖武天皇","天武天皇","明治天皇"], a:"後醍醐天皇", e:"鎌倉幕府滅亡後、後醍醐天皇が建武の新政を行いました。" },
  { level:"normal", q:"南北朝を合一した室町幕府の将軍は？", c:["足利義満","足利尊氏","足利義政","足利義昭"], a:"足利義満", e:"足利義満の時代に南北朝が合一しました。" },

  { level:"normal", q:"金閣を建てた人物は？", c:["足利義満","足利義政","豊臣秀吉","徳川家光"], a:"足利義満", e:"金閣は足利義満によって建てられました。" },
  { level:"normal", q:"銀閣を建てた人物は？", c:["足利義政","足利義満","徳川家康","北条泰時"], a:"足利義政", e:"銀閣は足利義政にゆかりがあります。" },
  { level:"normal", q:"楽市楽座を進めた戦国大名は？", c:["織田信長","武田信玄","毛利元就","今川義元"], a:"織田信長", e:"織田信長は商業活性化のため楽市楽座を進めました。" },
  { level:"normal", q:"長篠の戦いで鉄砲を有効に使った人物は？", c:["織田信長","源義経","足利尊氏","西郷隆盛"], a:"織田信長", e:"長篠の戦いでは鉄砲隊の活用が有名です。" },
  { level:"normal", q:"桶狭間の戦いで織田信長に敗れた人物は？", c:["今川義元","武田信玄","上杉謙信","明智光秀"], a:"今川義元", e:"桶狭間の戦いで今川義元が討たれました。" },

  { level:"normal", q:"大坂の陣で滅びた家は？", c:["豊臣家","徳川家","足利家","北条家"], a:"豊臣家", e:"大坂の陣で豊臣家は滅びました。" },
  { level:"normal", q:"武家諸法度を定めた幕府は？", c:["江戸幕府","鎌倉幕府","室町幕府","明治政府"], a:"江戸幕府", e:"武家諸法度は大名統制の法令です。" },
  { level:"normal", q:"享保の改革を行った将軍は？", c:["徳川吉宗","徳川家康","徳川家光","徳川慶喜"], a:"徳川吉宗", e:"徳川吉宗は享保の改革を行いました。" },
  { level:"normal", q:"寛政の改革を行った老中は？", c:["松平定信","田沼意次","水野忠邦","井伊直弼"], a:"松平定信", e:"松平定信が寛政の改革を行いました。" },
  { level:"normal", q:"天保の改革を行った老中は？", c:["水野忠邦","松平定信","田沼意次","大久保利通"], a:"水野忠邦", e:"天保の改革は水野忠邦が行いました。" },

  { level:"normal", q:"日米和親条約が結ばれた年は？", c:["1854年","1853年","1867年","1871年"], a:"1854年", e:"日米和親条約は1854年に結ばれました。" },
  { level:"normal", q:"安政の大獄を行った人物は？", c:["井伊直弼","坂本龍馬","西郷隆盛","徳川吉宗"], a:"井伊直弼", e:"井伊直弼は安政の大獄で反対派を弾圧しました。" },
  { level:"normal", q:"薩長同盟の仲介で知られる人物は？", c:["坂本龍馬","勝海舟","伊藤博文","板垣退助"], a:"坂本龍馬", e:"坂本龍馬は薩長同盟の仲介で知られます。" },
  { level:"normal", q:"五箇条の御誓文を出した時代は？", c:["明治時代","江戸時代","鎌倉時代","奈良時代"], a:"明治時代", e:"五箇条の御誓文は明治政府の基本方針です。" },
  { level:"normal", q:"地租改正で税の基準となったものは？", c:["地価","収穫量","人口","米の量"], a:"地価", e:"地租改正では地価を基準に税を納めました。" },

  { level:"normal", q:"自由民権運動で有名な人物は？", c:["板垣退助","徳川家康","源頼朝","足利義満"], a:"板垣退助", e:"板垣退助は自由民権運動の中心人物です。" },
  { level:"normal", q:"初代内閣総理大臣は？", c:["伊藤博文","大隈重信","山県有朋","西郷隆盛"], a:"伊藤博文", e:"日本の初代内閣総理大臣は伊藤博文です。" },
  { level:"normal", q:"大日本帝国憲法が発布された年は？", c:["1889年","1868年","1894年","1905年"], a:"1889年", e:"大日本帝国憲法は1889年に発布されました。" },
  { level:"normal", q:"日清戦争が始まった年は？", c:["1894年","1904年","1914年","1877年"], a:"1894年", e:"日清戦争は1894年に始まりました。" },
  { level:"normal", q:"日露戦争が始まった年は？", c:["1904年","1894年","1914年","1931年"], a:"1904年", e:"日露戦争は1904年に始まりました。" },

  { level:"normal", q:"第一次世界大戦が始まった年は？", c:["1914年","1918年","1939年","1945年"], a:"1914年", e:"第一次世界大戦は1914年に始まりました。" },
  { level:"normal", q:"満州事変が起きた年は？", c:["1931年","1923年","1937年","1941年"], a:"1931年", e:"満州事変は1931年です。" },
  { level:"normal", q:"日中戦争が本格化した年は？", c:["1937年","1931年","1941年","1945年"], a:"1937年", e:"盧溝橋事件をきっかけに1937年から本格化しました。" },
  { level:"normal", q:"太平洋戦争が始まった年は？", c:["1941年","1939年","1945年","1914年"], a:"1941年", e:"太平洋戦争は1941年に始まりました。" },
  { level:"normal", q:"日本国憲法が施行された年は？", c:["1947年","1945年","1951年","1964年"], a:"1947年", e:"日本国憲法は1947年5月3日に施行されました。" },

  { level:"hard", q:"白村江の戦いが起きた年は？", c:["663年","645年","701年","794年"], a:"663年", e:"白村江の戦いは663年に起きました。" },
  { level:"hard", q:"大宝律令が制定された年は？", c:["701年","645年","710年","794年"], a:"701年", e:"大宝律令は701年に制定されました。" },
  { level:"hard", q:"平城京遷都の年は？", c:["710年","794年","701年","1185年"], a:"710年", e:"710年、都は平城京に移されました。" },
  { level:"hard", q:"平安京遷都の年は？", c:["794年","710年","784年","894年"], a:"794年", e:"794年に平安京へ遷都されました。" },
  { level:"hard", q:"遣唐使が停止された年は？", c:["894年","794年","710年","907年"], a:"894年", e:"菅原道真の進言により遣唐使は停止されました。" },

  { level:"hard", q:"保元の乱が起きた年は？", c:["1156年","1159年","1185年","1221年"], a:"1156年", e:"保元の乱は1156年です。" },

let currentQuiz = [];
let current = 0;
let score = 0;
let answered = false;
let levelLabel = "";

const menu = document.getElementById("menu");
const quiz = document.getElementById("quiz");
const questionEl = document.getElementById("question");
const choicesEl = document.getElementById("choices");
const resultEl = document.getElementById("result");
const commentEl = document.getElementById("comment");
const countEl = document.getElementById("count");
const totalEl = document.getElementById("total");
const scoreEl = document.getElementById("score");
const nextBtn = document.getElementById("nextBtn");
const restartBtn = document.getElementById("restartBtn");
const levelNameEl = document.getElementById("levelName");

function shuffle(array) {
  return array.sort(() => Math.random() - 0.5);
}

function startGame(level) {
  if (level === "easy") {
    currentQuiz = shuffle(quizData.filter(x => x.level === "easy"));
    levelLabel = "初級";
  } else if (level === "normal") {
    currentQuiz = shuffle(quizData.filter(x => x.level === "normal"));
    levelLabel = "中級";
  } else if (level === "hard") {
    currentQuiz = shuffle(quizData.filter(x => x.level === "hard"));
    levelLabel = "上級";
  } else {
    currentQuiz = shuffle([...quizData]);
    levelLabel = "全100問";
  }

  current = 0;
  score = 0;
  scoreEl.textContent = score;
  totalEl.textContent = currentQuiz.length;
  levelNameEl.textContent = levelLabel;

  menu.classList.add("hidden");
  quiz.classList.remove("hidden");
  restartBtn.style.display = "none";

  loadQuestion();
}

function loadQuestion() {
  answered = false;
  resultEl.textContent = "";
  commentEl.textContent = "";
  nextBtn.style.display = "none";
  choicesEl.innerHTML = "";

  const q = currentQuiz[current];

  countEl.textContent = current + 1;
  questionEl.textContent = q.q;

  shuffle([...q.c]).forEach(choice => {
    const btn = document.createElement("button");
    btn.textContent = choice;
    btn.className = "choice";
    btn.onclick = () => checkAnswer(btn, choice);
    choicesEl.appendChild(btn);
  });
}

function checkAnswer(button, selected) {
  if (answered) return;
  answered = true;

  const q = currentQuiz[current];
  const buttons = document.querySelectorAll(".choice");

  buttons.forEach(btn => {
    if (btn.textContent === q.a) {
      btn.classList.add("correct");
    }
    btn.disabled = true;
  });

  if (selected === q.a) {
    score += 10;
    scoreEl.textContent = score;
    resultEl.textContent = "正解！";
  } else {
    button.classList.add("wrong");
    resultEl.textContent = "不正解…";
  }

  commentEl.textContent = q.e;

  if (current < currentQuiz.length - 1) {
    nextBtn.style.display = "inline-block";
  } else {
    finishGame();
  }
}

function nextQuestion() {
  current++;
  loadQuestion();
}

function finishGame() {
  questionEl.textContent = "ゲーム終了！";
  choicesEl.innerHTML = "";
  nextBtn.style.display = "none";
  restartBtn.style.display = "inline-block";

  const max = currentQuiz.length * 10;
  const rate = Math.round((score / max) * 100);

  commentEl.textContent = `あなたのスコアは ${score} / ${max} 点、正答率 ${rate}% です。`;

  if (rate === 100) {
    resultEl.textContent = "🏆 全問正解！歴史博士です！";
  } else if (rate >= 80) {
    resultEl.textContent = "🎉 かなり優秀です！";
  } else if (rate >= 50) {
    resultEl.textContent = "👍 まずまずです！";
  } else {
    resultEl.textContent = "📚 もう一度挑戦して覚えよう！";
  }
}

function restartGame() {
  quiz.classList.add("hidden");
  menu.classList.remove("hidden");
}
